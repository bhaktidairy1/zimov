<!DOCTYPE html>
<html>
<head>
    <title>Iruna Minimal Mode</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #000; color: #0f0; }
        button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 5px 10px; cursor: pointer; }
        button:hover { background: #0f0; color: #000; }
        input { width: 100%; max-width: 600px; padding: 5px; background: #111; color: #0f0; border: 1px solid #0f0; margin-bottom: 10px; }
        .section { border: 1px solid #0f0; padding: 10px; margin-bottom: 20px; max-width: 600px; }
    </style>
</head>
<body>
    <h1>Zimov Auto-Farmer (Minimal)</h1>
    <div id="login-section" class="section">
        <h3>0. Authentication</h3>
        <p>Paste your Mage URL below to connect and auto-start the Zimov loop.</p>
        <input type="text" id="auth-url" placeholder="https://gae4php82-real.an.r.appspot.com/...">
        <button style="background: #0f0; color: #000; border-color: #0f0; padding: 10px 20px; font-weight: bold;" onclick="connectBot()">CONNECT & START</button>
    </div>

    <div id="status-section" class="section" style="display: none;">
        <h3>1. Status & Stats</h3>
        <p>Connection: <strong id="conn-status">Checking...</strong></p>
        <p>Loop Status: <strong id="auto-status">Unknown</strong></p>
        <p>Map: <span id="map-name">Unknown</span></p>
        <p>Total Runs (7x+Heal): <span id="run-count">0</span></p>
        <p>Total Boss Kills: <span id="kill-count">0</span></p>
        <p>Total Spina Earned: <span id="spina-earned">0</span></p>
        <button style="background: #900; border-color: #f00; color: #fff; padding: 10px 20px; font-weight: bold;" onclick="killProgram()">Stop Program (Kill)</button>
    </div>

    <div class="section">
        <h3>2. Inventory</h3>
        <ul id="inventory-list"></ul>
    </div>

    <script>
        function connectBot() {
            const url = document.getElementById("auth-url").value;
            if(!url) return alert("Please enter a URL");
            
            fetch('/api/connect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });
            document.getElementById("login-section").style.display = "none";
        }

        function killProgram() {
            fetch('/api/stop', { method: 'POST' }).then(() => {
                document.body.innerHTML = "<h1 style='color:red;'>Program Stopped. You can close this tab.</h1>";
            });
        }
        setInterval(() => {
            fetch('/api/state').then(r=>r.json()).then(data => {
                if (data.connected) {
                    document.getElementById("login-section").style.display = "none";
                    document.getElementById("status-section").style.display = "block";
                }
                document.getElementById('conn-status').innerText = data.connected ? 'Connected' : 'Disconnected';
                document.getElementById('auto-status').innerText = data.auto_zimov_running ? 'Running' : 'Stopped';
                document.getElementById('run-count').innerText = data.auto_zimov_run_count || 0;
                document.getElementById('kill-count').innerText = data.auto_zimov_kill_count || 0;
                document.getElementById('spina-earned').innerText = data.spina_earned ? data.spina_earned.toLocaleString() : 0;
                document.getElementById('map-name').innerText = data.map_name || 'Unknown';
                
                let invHtml = '';
                if(data.inventory) {
                    let sorted = Object.values(data.inventory).sort((a,b) => b.count - a.count);
                    for(let item of sorted) {
                        invHtml += '<li>' + item.name + ': ' + item.count + '</li>';
                    }
                }
                document.getElementById('inventory-list').innerHTML = invHtml;
            }).catch(e => console.log('State fetch failed', e));
        }, 1000); // 1s polling is very light for local
    </script>
</body>
</html>
